behaviors:
  FlappyBird:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 81920
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 4
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    max_steps: 10000000
    time_horizon: 128
    summary_freq: 5000
    checkpoint_interval: 50000
    keep_checkpoints: 5
